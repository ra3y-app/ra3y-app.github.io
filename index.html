<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تطبيق رَاعِي</title>
  <meta name="description" content="رَاعِي — رفيقك الكامل في الرعاية الرعوية للكهنة الأقباط الأرثوذكس" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold:       #C9A84C;
      --gold-light: #E2C97E;
      --gold-dim:   #8B6914;
      --brown-dark: #2C1A0E;
      --brown-mid:  #4A2E14;
      --cream:      #F5EDD8;
      --cream-dim:  #EAD9B8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      direction: rtl;
      text-align: right;
    }

    body {
      direction: rtl;
      text-align: right;
      font-family: 'Tajawal', sans-serif;
      background-color: var(--brown-dark);
      color: var(--cream);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.13) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A84C' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* ── Top golden bar ── */
    .arch-top {
      width: 100%; height: 6px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
      border-radius: 0 0 999px 999px;
      opacity: 0.85;
    }

    /* ── Logo ── */
    .logo-ring {
      width: 108px; height: 108px;
      border-radius: 28px;
      background: linear-gradient(145deg, var(--brown-mid), var(--brown-dark));
      border: 2px solid var(--gold-dim);
      box-shadow:
        0 0 0 4px rgba(201,168,76,0.15),
        0 10px 36px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(201,168,76,0.22);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .logo-ring::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 40% 30%, rgba(201,168,76,0.2), transparent 60%);
    }
    .logo-text {
      font-family: 'Scheherazade New', serif;
      font-size: 2.8rem;
      color: var(--gold-light);
      text-shadow: 0 2px 14px rgba(201,168,76,0.6);
      position: relative; z-index: 1;
      line-height: 1;
    }

    /* ── Titles ── */
    .title-main {
      font-family: 'Scheherazade New', serif;
      font-size: 2rem; font-weight: 700;
      color: var(--gold-light);
      text-shadow: 0 2px 16px rgba(201,168,76,0.35);
      line-height: 1.3;
    }
    .title-sub {
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem; font-weight: 400;
      color: var(--cream-dim);
      letter-spacing: 0.02em;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      opacity: 0.6;
    }

    /* ── Feature chips — RTL flex ── */
    .feature-chip {
      background: rgba(201,168,76,0.07);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 14px;
      padding: 11px 16px;
      display: flex;
      flex-direction: row;       /* natural RTL: icon on right, text on left */
      align-items: center;
      gap: 12px;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.95rem;
      color: var(--cream-dim);
      transition: border-color 0.2s, background 0.2s;
      text-align: right;
    }
    .feature-chip:hover {
      background: rgba(201,168,76,0.13);
      border-color: rgba(201,168,76,0.45);
    }
    .feature-icon { font-size: 1.25rem; flex-shrink: 0; }

    /* ── Download button ── */
    .dl-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 18px 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
      color: var(--brown-dark);
      font-family: 'Scheherazade New', serif;
      font-size: 1.2rem; font-weight: 700;
      text-decoration: none;
      box-shadow:
        0 4px 28px rgba(201,168,76,0.5),
        inset 0 1px 0 rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.18);
      position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .dl-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }
    .dl-btn:active { transform: scale(0.97); box-shadow: 0 2px 14px rgba(201,168,76,0.35); }
    .dl-btn svg { flex-shrink: 0; }

    .dl-hint {
      text-align: center;
      font-size: 0.78rem;
      color: var(--gold-dim);
      margin-top: 8px;
      font-family: 'Tajawal', sans-serif;
    }

    /* ── Info box ── */
    .info-box {
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 18px;
      background: rgba(74,46,20,0.38);
      backdrop-filter: blur(4px);
      overflow: hidden;
    }
    .info-box-header {
      background: rgba(201,168,76,0.1);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 11px 18px;
      font-family: 'Scheherazade New', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--gold);
      text-align: right;
    }
    .info-row {
      display: flex;
      flex-direction: row;        /* RTL: label on right, value on left */
      align-items: flex-start;
      gap: 10px;
      padding: 11px 18px;
      border-bottom: 1px solid rgba(201,168,76,0.08);
      text-align: right;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.75rem; font-weight: 700;
      color: var(--gold-dim);
      white-space: nowrap;
      padding-top: 2px;
      min-width: 90px;
      text-align: right;
    }
    .info-value {
      font-family: 'Scheherazade New', serif;
      font-size: 0.95rem;
      color: var(--cream-dim);
      line-height: 1.55;
      text-align: right;
      flex: 1;
    }

    /* ── Ornament ── */
    .ornament {
      color: var(--gold-dim);
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      opacity: 0.6;
      text-align: center;
      display: block;
    }

    /* ── Skeleton shimmer ── */
    .skeleton {
      background: linear-gradient(
        90deg,
        rgba(201,168,76,0.07) 25%,
        rgba(201,168,76,0.16) 50%,
        rgba(201,168,76,0.07) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Warning notice ── */
    .notice-warn {
      background: rgba(201,120,40,0.12);
      border: 1px solid rgba(201,120,40,0.3);
      border-radius: 12px; padding: 10px 14px;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.82rem; color: #e8c080;
      text-align: center; display: none;
    }

    /* ── Fade-up animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.65s ease both; }
    .d1 { animation-delay: 0.08s; }
    .d2 { animation-delay: 0.18s; }
    .d3 { animation-delay: 0.28s; }
    .d4 { animation-delay: 0.40s; }
    .d5 { animation-delay: 0.55s; }
    .d6 { animation-delay: 0.70s; }
  </style>
</head>
<body>

  <!-- Top golden accent -->
  <div class="arch-top"></div>

  <!-- Phone-width container -->
  <div class="max-w-md mx-auto px-5 pt-10 pb-14" style="display:flex; flex-direction:column; gap:1.6rem;">

    <!-- Warning notice (shown only if app.json missing) -->
    <div id="load-notice" class="notice-warn fade-up"></div>

    <!-- ① Logo -->
    <div class="fade-up" style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <div class="logo-ring">
        <span class="logo-text" id="logo-text">رَاعِي</span>
      </div>
      <span class="ornament">✦ ✝ ✦</span>
    </div>

    <!-- ② Titles -->
    <div class="fade-up d1" style="text-align:center;">
      <h1 class="title-main" id="title-main">تطبيق رَاعِي</h1>
      <p class="title-sub" id="title-sub" style="margin-top:4px;">Ra3y App</p>
    </div>

    <div class="divider fade-up d1"></div>

    <!-- ③ Description -->
    <p id="description" class="fade-up d2"
       style="text-align:center; font-family:'Tajawal',sans-serif; font-size:0.97rem; line-height:1.85; color:var(--cream-dim);">
      <span class="skeleton" style="display:inline-block; width:85%; height:14px;"></span>
    </p>

    <!-- ④ Features -->
    <div id="features-list" class="fade-up d3" style="display:flex; flex-direction:column; gap:10px;">
      <div class="skeleton" style="height:46px; border-radius:14px;"></div>
      <div class="skeleton" style="height:46px; border-radius:14px;"></div>
      <div class="skeleton" style="height:46px; border-radius:14px;"></div>
    </div>

    <!-- ⑤ Download -->
    <div id="download-block" class="fade-up d4">
      <div class="skeleton" style="height:64px; border-radius:18px;"></div>
      <div class="skeleton" style="width:55%; height:12px; border-radius:6px; margin: 8px auto 0;"></div>
    </div>

    <!-- ⑥ Info Box -->
    <div class="info-box fade-up d5">
      <div class="info-box-header" id="info-header">معلومات التطبيق</div>
      <div id="info-rows">
        <div class="info-row"><div class="skeleton" style="width:100%; height:34px; border-radius:8px;"></div></div>
        <div class="info-row"><div class="skeleton" style="width:100%; height:34px; border-radius:8px;"></div></div>
        <div class="info-row"><div class="skeleton" style="width:100%; height:34px; border-radius:8px;"></div></div>
      </div>
    </div>

    <!-- ⑦ Footer -->
    <footer class="fade-up d6" style="text-align:center; font-family:'Tajawal',sans-serif; font-size:0.78rem; color:var(--gold-dim); line-height:1.9;">
      <span class="ornament" style="margin-bottom:6px;">✦ ✝ ✦</span>
      <span id="footer-text"></span><br/>
      <span id="footer-sub" style="opacity:0.5;"></span>
    </footer>

  </div><!-- /container -->


  <script>
  'use strict';

  /* ── Fallback data (if app.json is missing) ── */
  const FALLBACK = {
    app: {
      logoText:   "رَاعِي",
      titleAr:    "تطبيق رَاعِي",
      titleEn:    "Ra3y App",
      version:    "v1.2.0",
      apkFile:    "Ra3y.apk",
      androidMin: "Android 8.0+",
      apkSize:    "~18 MB"
    },
    ar: {
      description: "رفيقك الكامل في الرعاية الرعوية. أدر ملفات الرعية، تابع مواعيد الاعتراف، ونظّم المواعيد بكل سهولة.",
      features: [
        { icon: "👥", text: "إدارة الرعية" },
        { icon: "📅", text: "الاعتراف والمواعيد" },
        { icon: "✝️", text: "التقويم القبطي والأعياد" }
      ],
      downloadBtn: "تحميل التطبيق APK",
      infoHeader:  "معلومات التطبيق",
      androidHint: "مطلوب",
      infoRows: [
        { label: "البابا",       value: "قداسة البابا المعظم الأنبا تواضروس الثاني ١١٨" },
        { label: "الأسقف",      value: "نيافة الحبر الجليل الأنبا ميخائيل" },
        { label: "الإيبارشية",  value: "إيبارشية حلوان والمعصرة" },
        { label: "الفكرة",      value: "حقوق الفكرة — [الاسم هنا]" },
        { label: "المطور",      value: "اسم المطور" }
      ],
      footerMain: "© ٢٠٢٥ – ٢٠٢٦ تطبيق رَاعِي. جميع الحقوق محفوظة.",
      footerSub:  "بُني بالإيمان لخدمة الكنيسة القبطية."
    }
  };

  /* ── Load app.json then render ── */
  async function init() {
    let data, fallback = false;
    try {
      const res = await fetch('./app.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (e) {
      console.warn('app.json لم يُحمَّل — جارٍ استخدام البيانات الافتراضية.', e.message);
      data = FALLBACK;
      fallback = true;
    }
    render(data, fallback);
  }

  /* ── Render page from data ── */
  function render(data, fallback) {
    const app = data.app;
    const t   = data.ar;   /* Arabic only */

    /* Warning banner */
    if (fallback) {
      const n = document.getElementById('load-notice');
      n.style.display = 'block';
      n.textContent   = '⚠️ لم يتم تحميل app.json — يتم عرض البيانات الافتراضية.';
    }

    /* Logo */
    document.getElementById('logo-text').textContent = app.logoText;

    /* Titles */
    document.getElementById('title-main').textContent = app.titleAr;
    document.getElementById('title-sub').textContent  = app.titleEn;

    /* Description */
    document.getElementById('description').textContent = t.description;

    /* Features */
    const fl = document.getElementById('features-list');
    fl.innerHTML = '';
    t.features.forEach(f => {
      const d = document.createElement('div');
      d.className = 'feature-chip';
      d.innerHTML =
        `<span class="feature-icon">${f.icon}</span>` +
        `<span>${esc(f.text)}</span>`;
      fl.appendChild(d);
    });

    /* Download button */
    const db = document.getElementById('download-block');
    db.innerHTML =
      `<a href="${esc(app.apkFile)}" download class="dl-btn">` +
        `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"` +
            ` stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">` +
          `<path d="M12 3v13M6 11l6 6 6-6"/><path d="M5 21h14"/>` +
        `</svg>` +
        `<span>${esc(t.downloadBtn)} (${esc(app.version)})</span>` +
      `</a>` +
      `<p class="dl-hint">${esc(app.androidMin)} ${esc(t.androidHint)} · ${esc(app.apkSize)}</p>`;

    /* Info header */
    document.getElementById('info-header').textContent = t.infoHeader;

    /* Info rows */
    const ir = document.getElementById('info-rows');
    ir.innerHTML = '';
    t.infoRows.forEach(row => {
      const d = document.createElement('div');
      d.className = 'info-row';
      d.innerHTML =
        `<span class="info-label">${esc(row.label)}</span>` +
        `<span class="info-value">${esc(row.value)}</span>`;
      ir.appendChild(d);
    });

    /* Footer */
    document.getElementById('footer-text').textContent = t.footerMain;
    document.getElementById('footer-sub').textContent  = t.footerSub;
  }

  /* ── HTML escape ── */
  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
  </script>

</body>
</html>
